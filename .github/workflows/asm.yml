name: Continuous ASM Pipeline

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  run-recon:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t asm-pipeline .

      - name: Run Pipeline
        env:
          TARGET_DOMAIN: "example.com" # Change to your target
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }} # Store this in GitHub Secrets
        run: |
          # We mount a volume so the SQLite database persists between Docker runs during the action
          # Note: For true persistence across GitHub Action runs, you should upload the DB as an artifact 
          # or use a remote PostgreSQL database.
          docker run --rm \
            -e TARGET_DOMAIN=$TARGET_DOMAIN \
            -e WEBHOOK_URL=$WEBHOOK_URL \
            -v ${{ github.workspace }}:/app/data \
            asm-pipeline
