name: Continuous ASM Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch:

jobs:
  run-recon:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # This restores our SQLite database from previous runs!
      - name: Cache Database
        uses: actions/cache@v3
        with:
          path: data/asm_state.db
          key: asm-db-${{ github.run_id }}
          restore-keys: |
            asm-db-

      - name: Build Docker Image
        run: docker build -t asm-pipeline .

      - name: Create Data Directory
        run: mkdir -p data

      - name: Run Pipeline
        env:
          TARGET_DOMAIN: "example.com" 
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }} 
        run: |
          # Map the local 'data' dir to '/app/data' inside the container
          docker run --rm \
            -e TARGET_DOMAIN=$TARGET_DOMAIN \
            -e WEBHOOK_URL=$WEBHOOK_URL \
            -e DB_PATH=/app/data/asm_state.db \
            -v ${{ github.workspace }}/data:/app/data \
            asm-pipeline
